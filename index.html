<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>New Tab</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #020412;
    overflow: hidden;
    font-family: Arial, sans-serif;
  }

  .stars {
    position: absolute;
    inset: 0;
    height: 200%;
    background: inherit;
    animation: scroll 32s linear infinite;
    will-change: transform;
    pointer-events: none;
  }

  .stars::before,
  .stars::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: inherit;
    left: 0;
  }

  .stars::after {
    top: 100%;
  }

  @keyframes scroll {
    from { transform: translateY(-50%); }
    to   { transform: translateY(0%);   }
  }

  .center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 10;
  }

  .search {
    width: 820px;
    max-width: 80vw;
    padding: 20px 18px;
    border-radius: 30px;
    border: none;
    outline: none;
    font-size: 16px;
    background: rgba(255,255,255,0.9);
    box-shadow: 0 4px 25px rgba(0,0,0,0.4);
  }

  .star {
    position: absolute;
    background: radial-gradient(circle,
      #737aa0 0%,
      #3d4570 60%,
      #10143a 100%
    );
    border-radius: 50%;
    filter: blur(0.4px);
    pointer-events: none;
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="center">
  <form action="https://www.google.com/search">
    <input class="search" name="q" placeholder="Search Google..." autofocus>
  </form>
</div>

<script>
  const container = document.getElementById("stars");
  const starCount = 12000;

  for (let i = 0; i < starCount; i++) {
    const star = document.createElement("div");
    star.className = "star";

    const x = Math.random() * 100;
    const y = Math.random() * 200;

    star.style.left = x + "%";
    star.style.top  = y + "%";

    const size = Math.random() * 1.8 + 0.4;
    star.style.width  = size + "px";
    star.style.height = size + "px";

    star.style.filter = `blur(${Math.random() * 0.6 + 0.2}px)`;

    container.appendChild(star);
  }
</script>

</body>
</html>
