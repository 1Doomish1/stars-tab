<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>New Tab</title>

<style>
html, body {
    margin: 0;
    height: 100%;
    background: #020412; /* dark night sky */
    overflow: hidden;
    font-family: Arial, sans-serif;
}

/* star container */
#stars {
    position: absolute;
    width: 100%;
    height: 150%;
    animation: drift 50s linear infinite;
}

/* individual stars */
.star {
    position: absolute;
    border-radius: 50%; /* perfectly round dots */
}

@keyframes drift {
    from { transform: translateY(-50%); }
    to { transform: translateY(0%); }
}

/* centered search */
.center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

.search {
    width: 820px;
    max-width: 80vw;
    padding: 20px 18px;
    border-radius: 30px;
    border: none;
    outline: none;
    font-size: 16px;
    background: rgba(255,255,255,0.9);
}
</style>
</head>

<body>
<div id="stars"></div>

<div class="center">
<form action="https://www.google.com/search">
<input class="search" name="q" autofocus>
</form>
</div>

<script>
const starContainer = document.getElementById("stars");
const starCount = 5800;

// mostly violet/purple shades (no glow)
const starColors = [
    "#b99fff", 
    "#a67fff", 
    "#8a5fff", 
    "#7a3fff", 
    "#9c7aff", 
    "#c1a3ff",
];

for (let i = 0; i < starCount; i++) {
    const star = document.createElement("div");
    star.className = "star";

    // random position
    star.style.left = Math.random() * 100 + "%";
    star.style.top = Math.random() * 200 + "%";

    // small, crisp size (1px–2px)
    const size = Math.random() * 1 + 1;
    star.style.width = size + "px";
    star.style.height = size + "px";

    // pick color
    const color = starColors[Math.floor(Math.random() * starColors.length)];
    star.style.background = color;

    starContainer.appendChild(star);
}
</script>
</body>
</html>
