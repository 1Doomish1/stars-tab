```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>New Tab</title>

<style>

html, body {
    margin: 0;
    height: 100%;
    background: #020412;
    overflow: hidden;
    font-family: Arial, sans-serif;
}

/* star container */
#stars {
    position: absolute;
    width: 100%;
    height: 150%;
    animation: drift 50s linear infinite;
}

/* individual stars */
.star {
    position: absolute;
    width: 0.5px;
    height: 0.5px;
    background: radial-gradient(circle,
        #737aa0 0%,
        #3d4570 60%,
        #10143a 100%
    );
    border-radius: 50%;
    filter: blur(1px);
}
@keyframes drift {
    from { transform: translateY(-50%); }
    to { transform: translateY(0%); }
}

/* centered search */
.center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

.search {
    width: 820px;
    max-width: 80vw;
    padding: 20px 18px;
    border-radius: 30px;
    border: none;
    outline: none;
    font-size: 16px;
    background: rgba(255,255,255,0.9);
}

</style>
</head>

<body>

<div id="stars"></div>

<div class="center">
<form action="https://www.google.com/search">
<input class="search" name="q" autofocus>
</form>
</div>

<script>

const starContainer = document.getElementById("stars")

/* 2x more stars */
const starCount = 5800

for (let i = 0; i < starCount; i++) {

    const star = document.createElement("div")
    star.className = "star"

    star.style.left = Math.random() * 100 + "%"
    star.style.top = Math.random() * 200 + "%"

    const size = Math.random() * 2 + 1
    star.style.width = size + "px"
    star.style.height = size + "px"

    starContainer.appendChild(star)
}

</script>

</body>
</html>
