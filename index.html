<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>New Tab</title>

<style>

html, body {
    margin: 0;
    height: 100%;
    background: #020412;
    overflow: hidden;
    font-family: Arial, sans-serif;
}

/* star container */
#stars {
    position: absolute;
    width: 100%;
    height: 150%;
    animation: drift 50s linear infinite;
}

/* individual stars */
.star {
    position: absolute;
    border-radius: 50%;
    background: #ffffff;
    box-shadow: 0 0 1px #ffffff;
    animation: twinkle 2s infinite alternate;
}

@keyframes drift {
    from { transform: translateY(-50%); }
    to { transform: translateY(0%); }
}

@keyframes twinkle {
    from { opacity: 0.4; }
    to { opacity: 1; }
}

/* centered search */
.center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

.search {
    width: 820px;
    max-width: 80vw;
    padding: 20px 18px;
    border-radius: 30px;
    border: none;
    outline: none;
    font-size: 16px;
    background: rgba(255,255,255,0.9);
}

</style>
</head>

<body>

<div id="stars"></div>

<div class="center">
<form action="https://www.google.com/search">
<input class="search" name="q" autofocus>
</form>
</div>

<script>
const starContainer = document.getElementById("stars");
const starCount = 5800;

for (let i = 0; i < starCount; i++) {
    const star = document.createElement("div");
    star.className = "star";

    // random position
    star.style.left = Math.random() * 100 + "%";
    star.style.top = Math.random() * 200 + "%";

    // random size (1px–3px) for crisp but visible stars
    const size = Math.random() * 2 + 1;
    star.style.width = size + "px";
    star.style.height = size + "px";

    // subtle color variation for realism
    const shade = Math.floor(Math.random() * 100) + 155; // 155–255
    star.style.background = `rgb(${shade},${shade},${shade})`;
    star.style.boxShadow = `0 0 1px rgb(${shade},${shade},${shade})`;

    // random twinkle duration and delay for natural flicker
    star.style.animationDuration = (Math.random() * 1.5 + 1) + "s";
    star.style.animationDelay = Math.random() * 2 + "s";

    starContainer.appendChild(star);
}
</script>

</body>
</html>
